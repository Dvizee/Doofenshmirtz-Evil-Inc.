<!DOCTYPE html>
<html lang="en">
<head>

<body>

<h1>Doofenshmirtz Evil Inc.</h1>
<p>Login to my evil website</p>

<label for="username">Username:</label>
<input type="text" id="username" name="user_name">

<label for="password">Password:</label>
<input type="text" id="password" name="pass_word">

<button type="button" id="button">Login</button>

<script>
    const users = {
    "doof": "EVIL",
    "perry": "theplatypus",
    "admin": "admin"
};
    
let attempts = 0;
const maxAttempts = 5;

const btn = document.getElementById("button");
btn.addEventListener("click", function() {
  login();
});

function login() {
    
    if (attempts >= maxAttempts) {
       alert("You've been locked out, please contact an administrator");
       return;
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;
    
    if (users[username] && users[username] === password) {
        alert('Login successful!');
        // Redirect or show logged-in content
        // window.location.href = '/dashboard.html';
        alert("good job");
    } else {
        attempts += 1;
        alert('Invalid username or password');
    }
}
</script>
